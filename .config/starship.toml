[username]
format = "[$user](green bold) on "
style_user = "bold #8be9fd"

[hostname]
style = "bold #bd93f9"

[character]
error_symbol = "[✗](bold #ff5555)"
success_symbol = "[✓](bold #50fa7b)"

[cmd_duration]
style = "bold #f1fa8c"

[directory]
style = "bold #50fa7b"

[git_branch]
style = "bold #ff79c6"

[git_status]
style = "bold #ff5555"

[time]
disabled = false
format = '[$time](yellow bold) '
time_format = '%T'
utc_time_offset = '-5'